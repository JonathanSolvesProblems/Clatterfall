<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" type="text/css" href="splash.css" />
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <title>Clatterfall</title>
  </head>
  <body>
    <div class="wrap">
      <svg class="motif" viewBox="0 0 120 124" aria-hidden="true">
        <rect class="ramp r1" x="18" y="30" width="46" height="10" rx="4" transform="rotate(20 41 35)" />
        <rect class="ramp r2" x="58" y="62" width="46" height="10" rx="4" transform="rotate(-20 81 67)" />
        <rect class="ramp r3" x="26" y="92" width="46" height="10" rx="4" transform="rotate(16 49 97)" />
        <g class="pip">
          <circle cx="34" cy="22" r="10" fill="#A32D14" />
          <circle cx="34" cy="22" r="8" fill="#E4572E" />
          <circle cx="31" cy="19" r="3" fill="#FFD9B0" />
        </g>
      </svg>
      <h1 class="title">Clatter<span class="part">fall</span></h1>
      <div class="stat" id="stat">a machine the whole community builds</div>
      <p class="hook">
        <b>Nobody decides what stays. The marble does.</b> One machine, one part
        each per day, built only where yesterday's marble actually reached. Any part
        it stops touching dissolves, and no vote can save it.
      </p>
      <div class="ledger" id="ledger"></div>
      <button class="cta" id="start-button">
        Open the machine
        <svg class="cta-arrow" viewBox="0 0 10 12" aria-hidden="true">
          <path d="M2 1 L8 6 L2 11 Z" fill="currentColor" />
        </svg>
      </button>
      <div class="foot" id="foot"></div>
    </div>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
